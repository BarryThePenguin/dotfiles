[env]
_.file = "~/.config/mise/.env"
DOTFILES = { required = true }
EDITOR = "code"
HOLODECK_SSL_CERT_PATH = "/Users/jonno/holodeck-localhost.pem"
HOLODECK_SSL_KEY_PATH = "/Users/jonno/holodeck-localhost-key.pem"

[settings]
env_shell_expand = true
trusted_config_paths = ["~/src/btp", "~/src/work"]

[tools]
"github:SigNoz/signoz-mcp-server" = "0.5.1"
"npm:corepack" = "0.35.0"
"npm:@typespec/compiler" = "1.13.0"
"npm:@earendil-works/pi-coding-agent" = "0.79.7"
"dotnet:dotnet-ef" = "10.0.2"
age = "1.3.1"
atuin = "18.16.1"
aube = "1.22.0"
cloudflared = "2026.6.1"
cosign = "3.1.1"
deno = "2.8.3"
docker-cli = "29.5.3"
dotnet = "10.0.102"
fnox = "1.27.1"
gh = "2.95.0"
go = "1.26.4"
jq = "1.8.1"
lima = "2.1.3"
node = "24"
python = "3.14.6"
ripgrep = "15.1.0"
shellcheck = "0.11.0"
slsa-verifier = "2.7.1"
sops = "3.13.1"
starship = "1.25.1"
uv = "0.11.22"
zellij = "0.44.3"

[task_config]
includes = [".config/mise/tasks/dotfiles.toml"]
