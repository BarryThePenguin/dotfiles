HOLODECK_SSL_CERT_PATH = "/Users/jonno/holodeck-localhost.pem"
HOLODECK_SSL_KEY_PATH = "/Users/jonno/holodeck-localhost-key.pem"

[settings]
trusted_config_paths = ["~/src/btp", "~/src/work"]

[tools]
"http:signoz-mcp-server" = { version = "0.4.0", url = "https://github.com/SigNoz/signoz-mcp-server/releases/latest/download/signoz-mcp-server_darwin_arm64.tar.gz" }
"npm:corepack" = "0.35.0"
"npm:@typespec/compiler" = "1.12.0"
"npm:@earendil-works/pi-coding-agent" = "0.78.0"
age = "1.3.1"
atuin = "18.16.1"
cloudflared = "2026.5.2"
cosign = "3.0.6"
deno = "2.8.1"
fnox = "1.25.1"
gh = "2.93.0"
go = "1.26.3"
jq = "1.8.1"
lima = "2.1.1"
node = "24"
python = "3.14.5"
ripgrep = "15.1.0"
shellcheck = "0.11.0"
slsa-verifier = "2.7.1"
sops = "3.13.1"
starship = "1.25.1"
uv = "0.11.18"
