[env]
DOTFILES = { required = true }
EDITOR = "code"
MISE_ENV_FILE = ".env"
HOLODECK_SSL_CERT_PATH = "/Users/jonno/holodeck-localhost.pem"
HOLODECK_SSL_KEY_PATH = "/Users/jonno/holodeck-localhost-key.pem"
TODOIST_API_TOKEN = "{{ exec(command='op read \"op://Private/Todoist API token/password\"', cache_duration='8h') }}"

[settings]
trusted_config_paths = ["~/src/btp", "~/src/work"]

[tools]
"npm:corepack" = "0.34.7"
"npm:@typespec/compiler" = "1.11.0"
"npm:@earendil-works/pi-coding-agent" = "0.74.0"
age = "1.3.1"
atuin = "18.16.1"
cloudflared = "2026.3.0"
cosign = "3.0.6"
deno = "2.7.14"
go = "1.26.3"
jq = "1.8.1"
lima = "2.1.1"
node = "24"
python = "3.14.5"
ripgrep = "15.1.0"
shellcheck = "0.11.0"
slsa-verifier = "2.7.1"
sops = "3.13.1"
starship = "1.25.1"
uv = "0.11.14"
zellij = "0.44.3"

[task_config]
includes = [".config/mise/tasks/dotfiles.toml"]
