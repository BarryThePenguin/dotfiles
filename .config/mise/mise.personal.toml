[settings]
trusted_config_paths = ["~/src/btp"]

[env]
HOLODECK_SSL_CERT_PATH = "/Users/jonno/holodeck-localhost.pem"
HOLODECK_SSL_KEY_PATH = "/Users/jonno/holodeck-localhost-key.pem"
OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4317"
OTEL_EXPORTER_OTLP_PROTOCOL = "grpc"

[bootstrap.packages]
"brew-cask:headlamp" = "latest"
"brew-cask:notion" = "latest"
"brew-cask:opencode-desktop" = "latest"
"brew-cask:utm" = "latest"
"brew-cask:zed" = "latest"

[dotfiles]
"~/.config/opencode/opencode.jsonc" = { mode = "symlink" }
"~/.config/opencode/tui.json" = { mode = "symlink" }
"~/.config/opencode/skills" = { source = "~/src/btp/dotfiles/.agents/skills", mode = "symlink" }

[tools]
"github:SigNoz/signoz-mcp-server" = "0.9.0"
cloudflared = "2026.7.3"
cosign = "3.1.2"
copilot = "1.0.74"
deno = "2.9.4"
flux2 = "2.9.2"
flux-operator = "0.56.0"
kubectl = "1.36.3"
opencode = "1.18.4"
pi = "0.82.0"
slsa-verifier = "2.7.1"
